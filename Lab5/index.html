<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Лабораторна робота №5, Маніпуляція DOM та обробка подій</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <div class="container center">
        <h1>Маніпуляція DOM та обробка подій</h1>
      </div>
    </header>
    <main>
      <section class="container">
        <h2>Зміна вмісту елемента</h2>
        <p id="changeText"></p>
        <button class="button" id="buttonChangeText">Змінити текст</button>
      </section>
      <section class="container">
        <h2>Обробка подій</h2>
        <button class="button" id="hoverButton">Наведіть курсор на мене</button>
      </section>
      <section class="container">
        <h2>Додавання нового елемента</h2>
        <button class="button" id="addBtn">Додати елемент</button>
        <ul id="list"></ul>
      </section>
      <section class="container">
        <h2>Додаткове завдання</h2>
        <button class="button" id="pushBtn">Натисніть на мене 4 рази</button>
      </section>
    </main>
    <footer>
      <div class="container center">
        <p>Лабораторна робота 5. JavaScript, DOM, події</p>
      </div>
    </footer>

    <script src="./script.js"></script>
  </body>
</html>
