<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Лабораторна робота 2: Основи CSS</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <h1>Моя веб-сторінка з CSS</h1>
    </header>
    <main>
      <section>
        <h2>Про мене</h2>
        <p>
          Привіт! Я починаю вивчати CSS і цей проект допоможе мені освоїти
          основи стилізації веб-сторінок.
        </p>
      </section>
      <section>
        <h2>Мої улюблені речі</h2>
        <ul>
          <li>Улюблений колір</li>
          <li>Улюблене хобі</li>
          <li>Улюблена їжа</li>
        </ul>
      </section>
      <section class="quotes-section">
        <h2 class="quotes">Цитати відомих людей</h2>
        <figure>
          <blockquote cite="#">
            <p>Don’t push the horses.</p>
          </blockquote>
          <figcaption>
            — Олександр Усик, <cite>Інтерв'ю після бою</cite>
          </figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
